name: Update whale data

on:
  schedule:
    # every 30 minutes
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Fetch whale data
        id: fetch
        continue-on-error: true
        working-directory: scripts
        run: python fetch_whales.py

      - name: Score and rank wallets
        id: score
        continue-on-error: true
        working-directory: scripts
        run: python score_wallets.py

      - name: Walk-forward backtest
        id: backtest
        continue-on-error: true
        working-directory: scripts
        run: python backtest.py

      - name: Commit updated data if changed
        env:
          FETCH_OUTCOME: ${{ steps.fetch.outcome }}
          SCORE_OUTCOME: ${{ steps.score.outcome }}
          BT_OUTCOME:    ${{ steps.backtest.outcome }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs/data/whales.json docs/data/markets.json docs/data/last_updated.json \
                  docs/data/backtest_report.json docs/data/closed_outcomes.json 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          msg="chore(data): refresh whale snapshot ($(date -u +'%Y-%m-%dT%H:%MZ'))"
          if [[ "${FETCH_OUTCOME}" != "success" || "${SCORE_OUTCOME}" != "success" || "${BT_OUTCOME}" != "success" ]]; then
            msg="${msg} [partial: fetch=${FETCH_OUTCOME} score=${SCORE_OUTCOME} backtest=${BT_OUTCOME}]"
          fi

          git commit -m "${msg}"
          git push

      - name: Upload pipeline log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-log-${{ github.run_id }}
          path: scripts/pipeline.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Fail job if both steps failed
        if: steps.fetch.outcome == 'failure' && steps.score.outcome == 'failure'
        run: |
          echo "Both fetch and score steps failed - surfacing as job failure."
          exit 1
