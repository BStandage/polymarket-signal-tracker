name: Live signals

on:
  schedule:
    # every 5 minutes (GitHub Actions minimum)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: live-signals
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Poll watchlist for fresh trades
        id: poll
        continue-on-error: true
        working-directory: scripts
        run: python signal_detector.py

      - name: Commit + push if signals changed
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/live_signals.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No signal changes."
            exit 0
          fi
          git pull --rebase origin master || true
          git commit -m "chore(signals): refresh at $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push
